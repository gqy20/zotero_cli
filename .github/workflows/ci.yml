name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION_LDFLAGS: >-
    -X zotero_cli/internal/cli.version=dev
    -X zotero_cli/internal/cli.commit=${{ github.sha }}
    -X zotero_cli/internal/cli.buildDate=${{ github.event.head_commit.timestamp || github.run_id }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check (gofmt)
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build CLI
        run: make build

  cross-platform-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi
          out="dist/zot-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "${GO_VERSION_LDFLAGS}" -o "${out}" ./cmd/zot

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

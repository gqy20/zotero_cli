name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check YAML formatting
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          strict: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Capture release metadata
        id: meta
        shell: bash
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  build:
    name: Package (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
          version: latest

      - name: Build release archive
        shell: bash
        env:
          BINARY_NAME: zot
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          VERSION: ${{ env.RELEASE_VERSION }}
          GO_VERSION_LDFLAGS: >-
            -s -w
            -X zotero_cli/internal/cli.version=${{ env.RELEASE_VERSION }}
            -X zotero_cli/internal/cli.commit=${{ github.sha }}
            -X zotero_cli/internal/cli.buildDate=${{ needs.verify.outputs.build_date }}
        run: |
          mkdir -p dist package

          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi

          artifact_base="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="package/${artifact_base}"
          mkdir -p "${package_dir}"

          go build -trimpath -ldflags "${GO_VERSION_LDFLAGS}" -o "${package_dir}/${BINARY_NAME}${ext}" ./cmd/zot
          cp README.md "${package_dir}/README.md" 2>/dev/null || true
          cp LICENSE "${package_dir}/LICENSE" 2>/dev/null || true

          # Windows: UPX 压缩后直接覆盖为 zot.exe
          if [[ "${GOOS}" == "windows" ]]; then
            upx --best --lzma -o "${package_dir}/${BINARY_NAME}${ext}.tmp" "${package_dir}/${BINARY_NAME}${ext}" && mv "${package_dir}/${BINARY_NAME}${ext}.tmp" "${package_dir}/${BINARY_NAME}${ext}"
            cp "${package_dir}/${BINARY_NAME}${ext}" "dist/${artifact_base}.exe"
            echo "压缩大小: $(du -h "dist/${artifact_base}.exe" | cut -f1)"
          fi

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            (
              cd package
              zip -r "../dist/${artifact_base}.zip" "${artifact_base}"
            )
          else
            tar -C package -czf "dist/${artifact_base}.tar.gz" "${artifact_base}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Build release notes from changelog
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          version="${VERSION#v}"
          notes_file="release-notes.md"
          binary_name="zot"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > "${notes_file}"

          if [[ ! -s "${notes_file}" ]]; then
            echo "No changelog entry found for version ${version}" >&2
            exit 1
          fi

          {
            echo "### 下载"
            echo
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| Windows（推荐） | \`${binary_name}_${VERSION}_windows_amd64.exe\` (~6MB, UPX) |"
            echo "| Windows（完整包） | \`${binary_name}_${VERSION}_windows_amd64.zip\` |"
            echo "| macOS (Apple Silicon) | \`${binary_name}_${VERSION}_darwin_arm64.tar.gz\` |"
            echo "| macOS (Intel) | \`${binary_name}_${VERSION}_darwin_amd64.tar.gz\` |"
            echo "| Linux (x86_64) | \`${binary_name}_${VERSION}_linux_amd64.tar.gz\` |"
            echo "| Linux (arm64) | \`${binary_name}_${VERSION}_linux_arm64.tar.gz\` |"
            echo "| 校验和 | \`checksums.txt\` |"
            echo
            echo "### 更新内容"
            echo
            cat "${notes_file}"
            echo
            echo "---"
            echo
            echo "[完整更新日志](https://github.com/${{ github.repository }}/blob/${VERSION}/CHANGELOG.md)"
          } > "${notes_file}.tmp"

          mv "${notes_file}.tmp" "${notes_file}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_VERSION }} · zot
          tag_name: ${{ env.RELEASE_VERSION }}
          body_path: release-notes.md
          files: dist/*
          make_latest: true

      - name: Check YAML formatting
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          strict: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
      - publish
    if: startsWith(github.ref, 'refs/tags/')
    env:
      TAP_REPO: gqy20/homebrew-tap
      TAP_FORMULA_PATH: Formula/zotcli.rb
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check Homebrew token availability
        id: token
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -n "${TAP_TOKEN}" ]]; then
            echo "has_token=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_token=false" >> "${GITHUB_OUTPUT}"
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew tap update."
          fi

      - name: Download packaged artifacts
        if: steps.token.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Capture Homebrew artifact checksums
        if: steps.token.outputs.has_token == 'true'
        id: checksums
        shell: bash
        run: |
          set -euo pipefail

          linux_amd64="dist/zot_${VERSION}_linux_amd64.tar.gz"
          linux_arm64="dist/zot_${VERSION}_linux_arm64.tar.gz"
          darwin_amd64="dist/zot_${VERSION}_darwin_amd64.tar.gz"
          darwin_arm64="dist/zot_${VERSION}_darwin_arm64.tar.gz"

          echo "linux_amd64_sha=$(sha256sum "${linux_amd64}" | awk '{print $1}')" >> "${GITHUB_OUTPUT}"
          echo "linux_arm64_sha=$(sha256sum "${linux_arm64}" | awk '{print $1}')" >> "${GITHUB_OUTPUT}"
          echo "darwin_amd64_sha=$(sha256sum "${darwin_amd64}" | awk '{print $1}')" >> "${GITHUB_OUTPUT}"
          echo "darwin_arm64_sha=$(sha256sum "${darwin_arm64}" | awk '{print $1}')" >> "${GITHUB_OUTPUT}"

      - name: Check out Homebrew tap
        if: steps.token.outputs.has_token == 'true'
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap-repo

      - name: Update formula
        if: steps.token.outputs.has_token == 'true'
        shell: python3 {0}
        working-directory: tap-repo
        env:
          LINUX_AMD64_SHA: ${{ steps.checksums.outputs.linux_amd64_sha }}
          LINUX_ARM64_SHA: ${{ steps.checksums.outputs.linux_arm64_sha }}
          DARWIN_AMD64_SHA: ${{ steps.checksums.outputs.darwin_amd64_sha }}
          DARWIN_ARM64_SHA: ${{ steps.checksums.outputs.darwin_arm64_sha }}
          VERSION: ${{ env.RELEASE_VERSION }}
          REPO: ${{ github.repository }}
          TAP_FORMULA_PATH: Formula/zotcli.rb
        run: |
          import os
          content = f'''class Zotcli < Formula
            desc "Zotero CLI for terminal, scripts, and AI agents"
            homepage "https://github.com/{os.environ["REPO"]}"
            license "MIT"
            version "{os.environ["VERSION"]}"

            on_macos do
              on_intel do
                url "https://github.com/{os.environ["REPO"]}/releases/download/{os.environ["VERSION"]}/zot_{os.environ["VERSION"]}_darwin_amd64.tar.gz"
                sha256 "{os.environ["DARWIN_AMD64_SHA"]}"
              end
              on_arm do
                url "https://github.com/{os.environ["REPO"]}/releases/download/{os.environ["VERSION"]}/zot_{os.environ["VERSION"]}_darwin_arm64.tar.gz"
                sha256 "{os.environ["DARWIN_ARM64_SHA"]}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/{os.environ["REPO"]}/releases/download/{os.environ["VERSION"]}/zot_{os.environ["VERSION"]}_linux_amd64.tar.gz"
                sha256 "{os.environ["LINUX_AMD64_SHA"]}"
              end
              on_arm do
                url "https://github.com/{os.environ["REPO"]}/releases/download/{os.environ["VERSION"]}/zot_{os.environ["VERSION"]}_linux_arm64.tar.gz"
                sha256 "{os.environ["LINUX_ARM64_SHA"]}"
              end
            end

            def install
              bin.install "zot"
            end

            test do
              assert_match "zot", shell_output("#{{bin}}/zot --help")
            end
          end
          '''
          os.makedirs(os.path.dirname(os.environ["TAP_FORMULA_PATH"]), exist_ok=True)
          with open(os.environ["TAP_FORMULA_PATH"], "w") as f:
              f.write(content)

      - name: Commit and push tap update
        if: steps.token.outputs.has_token == 'true'
        shell: bash
        working-directory: tap-repo
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions@bot@users.noreply.github.com"

          git add "${TAP_FORMULA_PATH}"

          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi

          git commit -m "Update zotcli formula to ${VERSION}"
          git push origin HEAD:main

  upload-qiniu:
    name: Upload to Qiniu CDN
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
      - publish
    if: startsWith(github.ref, 'refs/tags/')
    env:
      QINIU_BUCKET: gqy25
      CDN_DOMAIN: https://qny.gqy20.top
    steps:
      - name: Set version prefix
        id: prefix
        run: echo "value=github/zotero_cli/${{ github.ref_name }}" >> "${GITHUB_OUTPUT}"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Install qshell
        run: |
          wget -q https://devtools.qiniu.com/qshell-v2.11.0-linux-amd64.tar.gz \
            -O /tmp/qshell.tar.gz && tar xzf /tmp/qshell.tar.gz -C /usr/local/bin qshell && chmod +x /usr/local/bin/qshell

      - name: Configure qshell account
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
        run: |
          qshell account "${QINIU_ACCESS_KEY}" "${QINIU_SECRET_KEY}" default

      - name: Upload release files to Qiniu
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_PREFIX: ${{ steps.prefix.outputs.value }}
          QINIU_BUCKET: gqy25
          CDN_DOMAIN: https://qny.gqy20.top
        run: |
          set -euo pipefail

          cd dist
          echo "=== Files to upload ==="
          ls -lh

          for f in *; do
            key="${QINIU_PREFIX}/${f}"
            echo "↑ ${f} → ${QINIU_BUCKET}:${key}"
            qshell fput "${QINIU_BUCKET}" "${key}" "${f}" 2>&1 || {
              echo "✗ Failed to upload ${f}, retrying..."
              sleep 3
              qshell fput "${QINIU_BUCKET}" "${key}" "${f}" 2>&1
            }
          done

          echo ""
          echo "=== Upload complete ==="
          echo ""
          echo "CDN URLs:"
          for f in *; do
            echo "  ${CDN_DOMAIN}/${QINIU_PREFIX}/${f}"
          done

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Package (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release archive
        shell: bash
        env:
          BINARY_NAME: zot
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist package

          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi

          artifact_base="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="package/${artifact_base}"
          mkdir -p "${package_dir}"

          go build -trimpath -o "${package_dir}/${BINARY_NAME}${ext}" ./cmd/zot
          cp README.md "${package_dir}/README.md" 2>/dev/null || true

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            (
              cd package
              zip -r "../dist/${artifact_base}.zip" "${artifact_base}"
            )
          else
            tar -C package -czf "dist/${artifact_base}.tar.gz" "${artifact_base}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
